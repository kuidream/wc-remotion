<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>量化动力学模拟竞技场</title>
    <style>
        body { margin: 0; background-color: #0f172a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #scoreboard { display: flex; justify-content: space-between; width: 600px; margin-bottom: 10px; font-size: 1.2rem; }
        .asset-a { color: #ef4444; font-weight: bold; }
        .asset-b { color: #3b82f6; font-weight: bold; }
        .timer { font-size: 1.5rem; color: #f59e0b; font-weight: bold; }
        canvas { background-color: #1e293b; border-radius: 50%; box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 30px #000; border: 4px solid #334155; }
    </style>
</head>
<body>

    <div id="scoreboard">
        <div class="asset-a">激进策略 (红): <span id="scoreA">100</span></div>
        <div class="timer">剩余年份: <span id="time">60</span></div>
        <div class="asset-b">稳健基准 (蓝): <span id="scoreB">100</span></div>
    </div>
    <canvas id="arena" width="600" height="600"></canvas>

<script>
    const canvas = document.getElementById('arena');
    const ctx = canvas.getContext('2d');
    
    // 物理场中心和半径
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const arenaRadius = 290;

    // 量化资产定义
    // 夏普(Sharpe) = maxSpeed: 寻找收益时的最高速度
    // 所提诺(Sortino) = mass: 质量，决定碰撞时谁被弹开
    // TTR = stunDuration: 碰到红区（回撤）时的晕眩帧数
    class Asset {
        constructor(x, y, color, maxSpeed, mass, stunDuration) {
            this.x = x; this.y = y;
            this.vx = 0; this.vy = 0;
            this.radius = 15;
            this.color = color;
            this.maxSpeed = maxSpeed;
            this.mass = mass;
            this.stunDuration = stunDuration;
            
            this.stunTimer = 0;
            this.score = 100; // 初始财富
        }

        update(target) {
            if (this.stunTimer > 0) {
                this.stunTimer--;
                this.vx *= 0.9; // 晕眩时剧烈减速
                this.vy *= 0.9;
            } else if (target) {
                // 追逐收益点
                let dx = target.x - this.x;
                let dy = target.y - this.y;
                let dist = Math.hypot(dx, dy);
                if (dist > 0) {
                    this.vx += (dx / dist) * 0.2;
                    this.vy += (dy / dist) * 0.2;
                }
            }

            // 限制最大速度 (夏普比率约束)
            let speed = Math.hypot(this.vx, this.vy);
            if (speed > this.maxSpeed && this.stunTimer <= 0) {
                this.vx = (this.vx / speed) * this.maxSpeed;
                this.vy = (this.vy / speed) * this.maxSpeed;
            }

            this.x += this.vx;
            this.y += this.vy;
            this.constrainToArena();
        }

        constrainToArena() {
            let dx = this.x - centerX;
            let dy = this.y - centerY;
            let dist = Math.hypot(dx, dy);
            if (dist > arenaRadius - this.radius) {
                let nx = dx / dist; let ny = dy / dist;
                this.x = centerX + nx * (arenaRadius - this.radius);
                this.vx *= -0.8; this.vy *= -0.8;
            }
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.stunTimer > 0 ? '#64748b' : this.color; // 晕眩时变灰
            ctx.fill();
            ctx.closePath();
        }
    }

    // 实例化两个标的
    // Asset A: 激进型 (夏普高跑得快，但所提诺低容易被弹飞，TTR长恢复慢)
    const assetA = new Asset(centerX - 100, centerY, '#ef4444', 6, 1, 90);
    // Asset B: 稳健型 (夏普低跑得慢，但所提诺高底盘稳，TTR短恢复快)
    const assetB = new Asset(centerX + 100, centerY, '#3b82f6', 3.5, 3, 20);
    const assets = [assetA, assetB];

    // 收益点与风险区
    let yieldOrb = spawnPoint();
    let riskZones = [spawnPoint(), spawnPoint(), spawnPoint()];
    let frames = 0;
    let timeLeft = 60; // 60年
    let gameActive = true;

    function spawnPoint() {
        let angle = Math.random() * Math.PI * 2;
        let r = Math.random() * (arenaRadius - 30);
        return { x: centerX + Math.cos(angle) * r, y: centerY + Math.sin(angle) * r };
    }

    // 物理碰撞解析 (所提诺比率博弈)
    function resolveCollision(a, b) {
        let dx = b.x - a.x;
        let dy = b.y - a.y;
        let dist = Math.hypot(dx, dy);
        
        if (dist < a.radius + b.radius) {
            let nx = dx / dist; let ny = dy / dist;
            let rvx = a.vx - b.vx; let rvy = a.vy - b.vy;
            let velAlongNormal = rvx * nx + rvy * ny;
            
            if (velAlongNormal > 0) {
                let restitution = 0.8; // 弹性系数
                // 核心：动量守恒公式，质量(所提诺)大的改变小
                let impulse = (1 + restitution) * velAlongNormal / (1/a.mass + 1/b.mass);
                
                a.vx -= (nx * impulse) / a.mass;
                a.vy -= (ny * impulse) / a.mass;
                b.vx += (nx * impulse) / b.mass;
                b.vy += (ny * impulse) / b.mass;
                
                // 防止重叠
                let overlap = (a.radius + b.radius - dist) / 2;
                a.x -= nx * overlap; a.y -= ny * overlap;
                b.x += nx * overlap; b.y += ny * overlap;
            }
        }
    }

    function gameLoop() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 绘制大盘基准网格 (背景装饰)
        ctx.strokeStyle = '#334155'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(centerX, centerY, arenaRadius * 0.6, 0, Math.PI * 2);
        ctx.stroke();

        // 绘制收益点 (金币)
        ctx.beginPath();
        ctx.arc(yieldOrb.x, yieldOrb.y, 8, 0, Math.PI * 2);
        ctx.fillStyle = '#10b981';
        ctx.fill();
        ctx.shadowBlur = 10; ctx.shadowColor = '#10b981';

        // 绘制风险区 (黑天鹅回撤点)
        ctx.shadowBlur = 0;
        riskZones.forEach(zone => {
            ctx.beginPath();
            ctx.arc(zone.x, zone.y, 12, 0, Math.PI * 2);
            ctx.fillStyle = '#b91c1c';
            ctx.fill();
        });

        // 动态更新与碰撞检测
        resolveCollision(assetA, assetB);

        assets.forEach(asset => {
            asset.update(yieldOrb);
            asset.draw();

            // 吃到收益
            if (Math.hypot(asset.x - yieldOrb.x, asset.y - yieldOrb.y) < asset.radius + 8) {
                asset.score += 10;
                yieldOrb = spawnPoint(); // 重新生成收益
                // 风险区位置也会随机飘移，模拟市场结构变化
                if (Math.random() > 0.5) riskZones[Math.floor(Math.random()*3)] = spawnPoint();
            }

            // 撞到风险区 (发生回撤)
            riskZones.forEach(zone => {
                if (Math.hypot(asset.x - zone.x, asset.y - zone.y) < asset.radius + 12) {
                    if(asset.stunTimer <= 0) {
                        asset.score -= 5; // 扣钱
                        asset.stunTimer = asset.stunDuration; // 触发TTR恢复惩罚
                        asset.vx *= -1; // 弹开
                        asset.vy *= -1;
                    }
                }
            });
        });

        // 更新UI
        document.getElementById('scoreA').innerText = assetA.score;
        document.getElementById('scoreB').innerText = assetB.score;

        // 时间管理
        frames++;
        if (frames % 60 === 0) {
            timeLeft--;
            document.getElementById('time').innerText = timeLeft;
            if (timeLeft <= 0) {
                gameActive = false;
                let winner = assetA.score > assetB.score ? "激进策略 (红) 胜出!" : "稳健基准 (蓝) 胜出!";
                if(assetA.score === assetB.score) winner = "平局!";
                setTimeout(() => alert("60年推演结束！\n" + winner), 100);
            }
        }

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
